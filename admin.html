<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عتیق پرامپس</title>

<style>
body {font-family: Arial; margin:0; background:#0f172a; color:white;}
header {background:#3b82f6; padding:15px; text-align:center; font-size:24px;}
.container {padding:20px; max-width:1000px; margin:auto;}

.search {width:100%; padding:10px; border-radius:10px; border:none; margin-bottom:20px;}

.upload {display:none; margin-bottom:20px;}
.upload input, .upload textarea {width:100%; margin-top:10px; padding:10px; border-radius:10px; border:none;}

button {padding:10px; border:none; border-radius:10px; cursor:pointer; margin-top:10px;}
.uploadBtn {background:#22c55e; color:white;}
.copyBtn {background:#06b6d4; color:white;}
.loginBtn {background:#f59e0b; color:white;}

.gallery {display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:20px;}
.card {background:#1e293b; border-radius:15px; overflow:hidden;}
.card img {width:100%; height:200px; object-fit:cover;}
.card p {padding:10px;}

</style>
</head>
<body>

<header>عتیق پرامپس</header>

<div class="container">

<input type="text" id="search" class="search" placeholder="پرامپٹ تلاش کریں...">

<button class="loginBtn" onclick="login()">Admin Login</button>

<div class="upload" id="uploadBox">
<input type="file" id="imageInput">
<textarea id="promptInput" placeholder="پرامپٹ لکھیں..."></textarea>
<button class="uploadBtn" onclick="addPost()">Upload</button>
</div>

<div class="gallery" id="gallery"></div>

</div>

<script>
let posts = JSON.parse(localStorage.getItem('posts')) || [];
let isAdmin = false;

function login(){
  let pass = prompt("Admin password ڈالیں");
  if(pass === "1234"){
    isAdmin = true;
    document.getElementById("uploadBox").style.display = "block";
    alert("Login successful");
  } else {
    alert("غلط پاسورڈ");
  }
}

function addPost(){
  if(!isAdmin) return;

  const file = document.getElementById('imageInput').files[0];
  const promptText = document.getElementById('promptInput').value;

  const reader = new FileReader();
  reader.onload = function(e){
    posts.push({image:e.target.result, prompt:promptText});
    localStorage.setItem('posts', JSON.stringify(posts));
    display(posts);
  };

  reader.readAsDataURL(file);
}

function copyText(text){
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

function display(data){
  const gallery = document.getElementById('gallery');
  gallery.innerHTML = "";

  data.forEach(p => {
    const div = document.createElement('div');
    div.className = 'card';

    div.innerHTML = `
      <img src="${p.image}">
      <p>${p.prompt}</p>
      <button class="copyBtn" onclick="copyText('${p.prompt.replace(/'/g, "\\'")}')">Copy Prompt</button>
    `;

    gallery.appendChild(div);
  });
}


document.getElementById('search').addEventListener('input', function(){
  const val = this.value.toLowerCase();
  const filtered = posts.filter(p => p.prompt.toLowerCase().includes(val));
  display(filtered);
});


display(posts);
</script>

</body>
</html>
