<!DOCTYPE html>
<html lang="ur">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>عتیق پرامپس</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: white;
    }
    

    header {
      background: linear-gradient(90deg, #06b6d4, #3b82f6);
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      animation: fadeIn 1s ease-in-out;
    }

    .container {
      padding: 20px;
    }

    .search-box {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      margin-bottom: 20px;
      font-size: 16px;
    }

    .upload-box {
      margin-bottom: 20px;
    }

    .upload-box input, .upload-box textarea {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
      border: none;
    }

    .btn {
      background: #22c55e;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #16a34a;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 15px;
      overflow: hidden;
      animation: slideUp 0.5s ease;
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .card p {
      padding: 10px;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>

<header>عتیق پرامپس</header>

<div class="container">

  <input type="text" id="search" class="search-box" placeholder="پرامپٹ تلاش کریں...">

  <div class="upload-box">
    <input type="file" id="imageInput">
    <textarea id="promptInput" placeholder="یہاں اپنا AI پرامپٹ لکھیں..."></textarea>
    <button class="btn" onclick="addPost()">اپلوڈ کریں</button>
  </div>

  <div class="gallery" id="gallery"></div>

</div>
